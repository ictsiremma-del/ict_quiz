<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teacher Registration — {{ school }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>
body{background:linear-gradient(135deg,#1a3a5c,#2e86ab) !important;}
.card{box-shadow:0 20px 50px rgba(0,0,0,.25);border:none;border-radius:20px;overflow:hidden}
.icon{text-align:center;font-size:48px;margin-bottom:12px}
h1{text-align:center;color:#1a3a5c;font-size:22px;margin-bottom:8px}
p{text-align:center;color:#556;font-size:14px;margin-bottom:24px;line-height:1.6}
.fg{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
input,select{width:100%;padding:11px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:#2e86ab}
textarea{resize:vertical}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#1a3a5c,#2e86ab);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.error{background:#fadbd8;color:#e74c3c;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;border-left:3px solid #e74c3c}
.subjects{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.subjects label{display:flex;align-items:center;gap:8px;font-size:13px;color:#444;font-weight:600}
.back{text-align:center;margin-top:18px}
.back a{color:#2e86ab;font-size:13px;text-decoration:none;font-weight:600}
</style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card">
<div class="card-body p-4">
  <div class="icon">🧑‍🏫</div>
  <h1>Teacher Registration</h1>
  <p>Create a new teacher account for the quiz system.</p>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-bold text-uppercase small">Full Name</label>
      <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold text-uppercase small">Login ID</label>
      <input type="text" name="uid" class="form-control" placeholder="Choose a username" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold text-uppercase small">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="Enter your email address" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold text-uppercase small">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter a password" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold text-uppercase small">Confirm Password</label>
      <input type="password" name="confirm_password" class="form-control" placeholder="Confirm your password" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold text-uppercase small">Subjects</label>
      <div class="subjects">
        {% for subject in subjects %}
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="subjects" value="{{ subject }}" id="subject-{{ loop.index }}">
          <label class="form-check-label" for="subject-{{ loop.index }}">{{ subject }}</label>
        </div>
        {% endfor %}
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100 fw-bold">Register</button>
  </form>
  <div class="text-center mt-3">
    <a href="/teacher" class="text-decoration-none">← Back to Teacher Login</a>
  </div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
