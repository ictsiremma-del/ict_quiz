<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ school }} — Quiz Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Chicago', sans-serif;
  background:linear-gradient(135deg,#87CEEB 0%,#6A0DAD 100%);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:30px 20px;
}
.card{
  background:white;
  border-radius:20px;
  padding:32px;
  width:100%;
  max-width:520px;
  max-height:calc(100vh - 60px);
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.school-icon{text-align:center;font-size:48px;margin-bottom:8px}
h1{text-align:center;color:#6A0DAD;font-size:22px;font-weight:bold;margin-bottom:3px}
h2{text-align:center;color:#FFD700;font-size:14px;font-weight:bold;margin-bottom:22px}
.fg{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input,select{
  width:100%;padding:10px 13px;border:2px solid #e0e0e0;border-radius:10px;
  font-size:14px;outline:none;transition:border .2s;color:#333;background:white
}
input:focus,select:focus{border-color:#87CEEB}

/* Assessment type buttons */
.atype-row{display:flex;gap:8px;margin-bottom:14px}
.atype-btn{
  flex:1;padding:10px 6px;border:2px solid #e0e0e0;border-radius:9px;
  cursor:pointer;text-align:center;transition:all .15s;background:white;color:#333
}
.atype-btn:hover{
  border-color:#6A0DAD;background:#B266FF;color:#FFD700;
  transition:all .3s ease;box-shadow:0 0 8px rgba(106,13,173,0.3)
}
.atype-btn.sel{
  border-color:#6A0DAD;background:#6A0DAD;color:#FFD700;
  font-weight:bold;box-shadow:0 0 10px rgba(106,13,173,0.4)
}
.atype-btn.sel .an{color:#FFD700}
.atype-btn.sel .ad{color:#ecf0f1}
.atype-btn .ai{font-size:18px;display:block;margin-bottom:2px}
.atype-btn .an{font-size:11px;font-weight:700}
.atype-btn .ad{font-size:10px;opacity:.7;margin-top:1px}

.strand-wrap{display:none;margin-bottom:14px}
.btn{
  width:100%;padding:13px;background:linear-gradient(135deg,#87CEEB,#FFD700);
  color:#6A0DAD;border:none;border-radius:10px;font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity .2s
}
.btn:hover{opacity:.9;box-shadow:0 0 12px rgba(135,206,235,0.6)}

.info-strip{display:flex;gap:7px;margin-top:14px}
.info-box{flex:1;background:#f8f9fa;border-radius:8px;padding:9px;text-align:center}
.info-box .n{font-size:16px;font-weight:700;color:#6A0DAD}
.info-box .l{font-size:10px;color:#888;margin-top:2px}

.links{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.links a{font-size:12px;font-weight:600;text-decoration:none;padding:7px 14px;border-radius:8px}
.link-bece{background:linear-gradient(135deg,#6A0DAD,#FFD700);color:white}
.link-teacher{color:#3498db}
.err{color:#e74c3c;font-size:12px;display:none;margin-top:4px}
</style>
</head>
<body>
<div class="card">
  <div class="school-icon">🎓</div>
  <h1>{{ school }}</h1>
  <h2>Student Assessment Portal</h2>

  <form action="/start" method="POST" onsubmit="return validate()">
    <div class="fg">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Enter your full name" required autocomplete="off">
    </div>

    <div class="fg">
      <label>Class</label>
      <select name="class" required>
        <option value="" disabled selected>-- Select Your Class --</option>
        {% for c in classes %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
      </select>
    </div>

    <div class="fg">
      <label>Assessment Type</label>
      <div class="atype-row" id="atypeRow">
        {% for key, at in assessment_types.items() %}
        <div class="atype-btn {{ 'sel' if loop.first else '' }}" onclick="pickType('{{ key }}',this)">
          <input type="radio" name="assessment_type" value="{{ key }}"
                 {{ 'checked' if loop.first else '' }} style="display:none">
          <span class="ai">{{ at.icon }}</span>
          <div class="an">{{ at.label }}</div>
          <div class="ad">{{ at.description[:30] }}</div>
        </div>
        {% endfor %}
      </div>
    </div>

    <div class="fg">
      <label>Subject</label>
      <select name="subject" id="subjectInput" required>
        <option value="" disabled selected>-- Select Your Subject --</option>
        {% for s in subjects %}
          <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
      </select>
      <div class="err" id="subjErr">Please select a subject.</div>
    </div>

    <button type="submit" class="btn" id="startBtn">START →</button>
  </form>

  <!-- Restored info strip -->
  <div class="info-strip">
    <div class="info-box"><div class="n">📝</div><div class="l">Class Test 30min</div></div>
    <div class="info-box"><div class="n">📋</div><div class="l">Exam 60min</div></div>
    <div class="info-box"><div class="n">🏠</div><div class="l">Homework No Timer</div></div>
    <div class="info-box"><div class="n">A-F</div><div class="l">Auto Grade</div></div>
  </div>

  <div class="links">
    <a href="/bece" class="link-bece">🎓 JHS 3 — BECE Practice</a>
    <a href="/teacher" class="link-teacher">🔐 Teacher Login</a>
  </div>
</div>

<script>
function pickType(val, el){
  document.querySelectorAll(".atype-btn").forEach(b=>b.classList.remove("sel"));
  el.classList.add("sel");
  el.querySelector("input").checked=true;
  var labels={
    "class_test":"START CLASS TEST →",
    "exam":"START EXAM →",
    "homework":"START HOMEWORK →"
  };
  document.getElementById("startBtn").textContent=labels[val]||"START →";
}
</script>
</body>
</html>
