<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICT Quiz Portal</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #2c3e50; /* Dark navy background */
      color: #ecf0f1; /* Light text */
      font-family: 'Segoe UI', sans-serif;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      background-color: rgba(236, 240, 241, 0.1); /* Transparent light overlay */
      border: none;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    h1 {
      color: #ecf0f1;
    }
    .btn-custom {
      margin: 10px;
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 8px;
      transition: 0.3s;
    }
    .btn-student {
      background-color: #3498db;
      color: #fff;
    }
    .btn-student:hover {
      background-color: #2980b9;
    }
    .btn-teacher {
      background-color: #ecf0f1;
      color: #2c3e50;
    }
    .btn-teacher:hover {
      background-color: #bdc3c7;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="card">
      <h1 class="mb-4">Glorious Pearls Complex School</h1>
      <p class="lead mb-4">Test your knowledge and track your progress</p>
      <div>
        <a href="/student" class="btn btn-custom btn-student">🎓 Start Student Quiz</a>
        <a href="/teacher" class="btn btn-custom btn-teacher">👩‍🏫 Teacher Login</a>
      </div>
    </div>
  </div>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
