<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ school }} — Welcome</title>
<style>
:root {font-family: 'Segoe UI', sans-serif; color: #1a202c; background: linear-gradient(135deg, #eff6ff, #f3e8ff);}
* {box-sizing:border-box;}
body {margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;}
.page {width:min(95%, 520px); background:white; border-radius:24px; padding:36px 32px; box-shadow:0 30px 80px rgba(15,23,42,.12);}
.brand {font-size:28px; font-weight:800; margin-bottom:8px;}
.subtitle {font-size:15px; color:#475569; margin-bottom:28px;}
.buttons {display:grid; gap:14px;}
.btn {display:inline-flex; align-items:center; justify-content:center; padding:16px 20px; border-radius:14px; text-decoration:none; font-weight:700; font-size:15px; transition:transform .2s, box-shadow .2s;}
.btn-primary {background:linear-gradient(135deg,#4338ca,#8b5cf6); color:white;}
.btn-secondary {background:linear-gradient(135deg,#7c3aed,#a855f7); color:white;}
.btn:hover {transform:translateY(-1px); box-shadow:0 14px 30px rgba(99,102,241,.2);}
.note {margin-top:24px; font-size:13px; color:#64748b; line-height:1.6;}
</style>
</head>
<body>
<div class="page">
  <div class="brand">{{ school }}</div>
  <div class="subtitle">Welcome to the quiz portal. Choose a path below to continue.</div>
  <div class="buttons">
    <a href="/student" class="btn btn-primary">Start Student Quiz</a>
    <a href="/teacher" class="btn btn-secondary">Teacher Login</a>
  </div>
  <div class="note">If you are a teacher, use the login link. Students can start immediately from the student quiz portal.</div>
</div>
</body>
</html>
