<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICT Quiz Portal</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #87CEEB 0%, #6A0DAD 100%); /* Sky Blue to Purple gradient */
      color: #FFD700; /* Yellow text */
      font-family: 'Chicago', sans-serif;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      background-color: rgba(255, 255, 255, 0.1); /* Transparent overlay */
      border: none;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    h1 {
      color: #6A0DAD; /* Purple heading */
      font-weight: bold;
    }
    p.lead {
      color: #FFD700; /* Yellow subheading */
      font-weight: bold;
    }
    .btn-custom {
      margin: 10px;
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 8px;
      transition: 0.3s;
      font-weight: bold;
    }
    .btn-student {
      background: linear-gradient(135deg, #87CEEB, #FFD700); /* Sky Blue to Yellow */
      color: #6A0DAD; /* Purple text */
    }
    .btn-student:hover {
      opacity: 0.9;
      box-shadow: 0 0 12px rgba(135,206,235,0.6);
    }
    .btn-teacher {
      background-color: #6A0DAD; /* Purple */
      color: #FFD700; /* Yellow text */
    }
    .btn-teacher:hover {
      background-color: #5a0ca0;
      color: #FFD700;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="card">
      <h1 class="mb-4">Glorious Pearls Complex School</h1>
      <p class="lead mb-4">Test your knowledge and track your progress</p>
      <div>
        <a href="/student" class="btn btn-custom btn-student">🎓 Start Student Quiz</a>
        <a href="/teacher" class="btn btn-custom btn-teacher">👩‍🏫 Teacher Login</a>
      </div>
    </div>
  </div>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
