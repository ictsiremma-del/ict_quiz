<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ school }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            background: linear-gradient(135deg, #E0E7FF 0%, #F3E8FF 100%) !important;
        }
        .card {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 16px;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            border: none;
            color: white;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #4338CA, #6D28D9);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            border: none;
            color: white;
            font-weight: 600;
        }
        .btn-secondary:hover {
            background: linear-gradient(135deg, #6D28D9, #9333EA);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="container mx-auto max-w-md">
        <div class="card bg-white p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">{{ school }}</h1>
                <h2 class="text-lg text-gray-600 font-semibold">Quiz System</h2>
            </div>
            <div class="space-y-4">
                <a href="/student" class="btn btn-primary w-full py-3 text-lg">Start Student Quiz</a>
                <a href="/teacher" class="btn btn-secondary w-full py-3 text-lg">Teacher Login</a>
            </div>
        </div>
    </div>
</body>
</html>
